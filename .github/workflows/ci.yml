name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust · fmt · clippy · test · wasm-build
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 + clippy + rustfmt)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          target: wasm32v1-none

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit + integration tests
        run: cargo test --workspace --locked

      - name: Build Wasm release artifacts
        # The OZ stellar-contracts (=0.7.1) deps enable soroban-sdk's
        # `experimental_spec_shaking_v2` feature, which requires this flag (set
        # internally by `stellar contract build`) for the wasm target.
        env:
          SOROBAN_SDK_BUILD_SYSTEM_SUPPORTS_SPEC_SHAKING_V2: "1"
        run: cargo build --release --target wasm32v1-none --workspace --locked

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm
          if-no-files-found: error
          retention-days: 30

  typescript:
    name: TypeScript SDK · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build
      - run: npm test
