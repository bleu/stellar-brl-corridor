# Bleu — Anchor Platform local stack (testnet)
# Copy `env.example` -> `.env` and fill values before `docker compose up`.

services:
  anchor-platform:
    # Pinned to 4.3.0: 4.4.0 has a bug where exchangeAmountsCalculator bean uses
    # @OnAllSepsEnabled(sep6, sep24, sep31), so it's never created when sep24 is
    # disabled. Revisit when a patch release fixes the condition.
    image: stellar/anchor-platform:4.3.0
    container_name: bleu-ap
    restart: unless-stopped
    # AP needs an explicit start command; with none it prints usage and exits.
    # --sep-server serves SEP-1/10/12/24/31/38; --platform-server serves the
    # Platform API consumed by the business server.
    command: ["--sep-server", "--platform-server"]
    ports:
      - "8080:8080"   # SEP server
      - "8081:8081"   # platform API
    env_file:
      - .env
    volumes:
      - ./config:/home/anchorplatform/config:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: bleu-ap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
      POSTGRES_DB: anchor
    ports:
      - "5432:5432"
    volumes:
      - bleu-ap-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bleu-ap-postgres:
